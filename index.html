@keyframes rise{

  10%{opacity:.9;}

}

<script>
const $ = s => document.querySelector(s);
const thaiNum = n => String(n).replace(/\d/g, d => "๐๑๒๓๔๕๖๗๘๙"[d]);

/* ── ระบบโหลดภาพแบบมีตัวสำรอง (CDN fallback) ──
   เน็ตบางเครือข่ายในไทยเข้า raw.githubusercontent.com ไม่ได้
   จึงลองหลายแหล่งเรียงกัน ถ้าตัวแรกพลาดจะสลับตัวถัดไปเอง  */
function ghParts(){
  // แกะ user/repo/branch จาก GITHUB_BASE (รองรับทั้ง raw และ cdn jsdelivr)
  let m = GITHUB_BASE.match(/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\//);
  if(m) return {user:m[1], repo:m[2], branch:m[3]};
  m = GITHUB_BASE.match(/jsdelivr\.net\/gh\/([^/]+)\/([^@/]+)@([^/]+)\//);
  if(m) return {user:m[1], repo:m[2], branch:m[3]};
  return null;
}
const GH = ghParts();
function sources(path){
  // คืนลิสต์ URL เรียงตามลำดับที่จะลอง
  if(!GH) return [(GITHUB_BASE||"") + path];
  const {user,repo,branch} = GH;
  return [
    `https://cdn.jsdelivr.net/gh/${user}/${repo}@${branch}/${path}`,   // CDN หลัก เข้าได้จากเน็ตไทย เร็ว
    `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${path}`, // สำรอง 1
    `https://cdn.statically.io/gh/${user}/${repo}/${branch}/${path}`,  // สำรอง 2
  ];
}
// โหลดภาพโดยไล่ลองทีละแหล่ง  onOK(imgEl) เมื่อสำเร็จ  onFail() เมื่อหมดทุกแหล่ง
// ใช้ <img> ที่ผูกกับ DOM (ไม่ใช่ new Image() ลอยๆ) เพื่อเลี่ยงปัญหา CORS เวลาเปิดไฟล์แบบ file://
function loadImage(path, alt, onOK, onFail){
  const srcs = sources(path);
  const img = document.createElement("img");
  img.alt = alt || "";
  img.decoding = "async";
  let i = 0;
  img.addEventListener("load", () => {
    console.log("[หอเล่าเรื่อง] โหลดสำเร็จ:", img.getAttribute("src"));
    onOK(img);
  });
  img.addEventListener("error", () => {
    console.warn("[หอเล่าเรื่อง] โหลดไม่ได้:", img.getAttribute("src"));
    i++;
    if(i < srcs.length){ img.setAttribute("src", srcs[i]); }
    else { console.error("[หอเล่าเรื่อง] หมดทุกแหล่งแล้ว:", path); onFail && onFail(); }
  });
  img.setAttribute("referrerpolicy", "no-referrer");
  img.setAttribute("src", srcs[0]);
  return img;
}
const url = p => sources(p)[0]; // ใช้ตอนแสดงตัวอย่าง/ลิงก์เฉยๆ

/* ── สร้างเศษไฟกระพริบ ── */
(function(){
  const box = $("#embers");
  for(let i=0;i<14;i++){
    const e=document.createElement("div");
    e.className="ember";
    e.style.left=Math.random()*100+"%";
    e.style.bottom=(-5-Math.random()*20)+"%";
    const dur=9+Math.random()*10;
    e.style.animationDuration=dur+"s";
    e.style.animationDelay=(-Math.random()*dur)+"s";
    e.style.opacity=.3+Math.random()*.5;
    box.appendChild(e);
  }
})();

/* ── หน้าแรก: ชั้นวางหนังสือ ── */
function renderHome(){
  const app = $("#app");
  app.innerHTML = `
    <div class="home">
      <div class="brand">
        <div class="lantern">🏮</div>
        <h1>หอเล่าเรื่อง</h1>
        <p>การ์ตูนผีไทย</p>
        <div class="rule"></div>
      </div>
      <div class="shelf-label">เลือกเรื่องที่อยากอ่าน</div>
      <div class="grid" id="grid"></div>
    </div>`;
  const grid = $("#grid");
  STORIES.forEach((s, i) => {
    const b = document.createElement("button");
    b.className = "book";
    b.onclick = () => openReader(i);
    const coverBox = document.createElement("div");
    coverBox.className = "cover";
    if(GITHUB_BASE && s.cover){
      coverBox.innerHTML = `<div class="ph"><div class="spinner"></div></div>`;
      loadImage(s.cover, s.title,
        (img)=>{ coverBox.innerHTML=""; coverBox.appendChild(img); },
        ()=>{ coverBox.innerHTML = `<div class="ph"><div class="ico">🖼️</div>
              <small>โหลดปกไม่ได้<br>เช็กว่าอัปภาพ<br>ขึ้น repo แล้ว</small></div>`; });
    } else {
      coverBox.innerHTML = `<div class="ph"><div class="ico">🖼️</div><small>ยังไม่ได้ตั้ง<br>GITHUB_BASE</small></div>`;
    }
    b.innerHTML = `<h3>${s.title}</h3>
      <div class="pagecount">${thaiNum(s.pages.length)} หน้า</div>`;
    b.insertBefore(coverBox, b.firstChild);
    grid.appendChild(b);
  });
}

/* ── โหมดอ่าน ── */
let current = -1;
function openReader(i){
  current = i;
  const s = STORIES[i];
  $("#rTitle").textContent = s.title;
  const stage = $("#stage");
  stage.innerHTML = "";

  s.pages.forEach((p, idx) => {
    const pg = document.createElement("div");
    pg.className = "page";
    pg.innerHTML = `<div class="loading"><div class="spinner"></div>
        <span>กำลังเปิดหน้า ${thaiNum(idx+1)}</span></div>`;
    if(GITHUB_BASE){
      loadImage(p, `${s.title} หน้า ${idx+1}`,
        (img)=>{ pg.innerHTML=""; pg.appendChild(img); },
        ()=>{ pg.innerHTML = `<div class="ph" style="aspect-ratio:auto;min-height:60vh">
          <div class="ico">⚠️</div>
          <small>โหลดภาพหน้านี้ไม่ได้<br>(${p})<br><br>เช็กว่าอัปขึ้น repo<br>และต่อเน็ตอยู่</small></div>`; });
    } else {
      pg.innerHTML = `<div class="ph" style="aspect-ratio:auto;min-height:60vh">
        <div class="ico">🖼️</div>
        <small>หน้า ${thaiNum(idx+1)}<br>(ตั้งค่า GITHUB_BASE ก่อน)</small></div>`;
    }
    stage.appendChild(pg);
  });

  // หน้าจบเรื่อง
  const end = document.createElement("div");
  end.className = "endcard";
  end.innerHTML = `
    <div class="seal">🔚</div>
    <h2>จบเรื่อง</h2>
    <p>ขอบคุณที่ติดตามจนจบนะครับ<br>ถ้าชอบเรื่องนี้ อ่านฉบับเต็มความคมชัดสูงได้</p>
    ${s.buyUrl ? `<button class="buybtn" onclick="window.open('${s.buyUrl}','_blank')">หาซื้อฉบับเต็ม</button>` : ``}
    <button class="backbtn" id="endBack">‹ กลับไปเลือกเรื่องอื่น</button>`;
  stage.appendChild(end);

  $("#reader").classList.add("open");
  document.body.style.overflow = "hidden";
  stage.scrollTop = 0;
  updateProgress();
  $("#endBack").onclick = closeReader;

  // เริ่มเพลงถ้ามีและผู้ใช้เคยเปิดไว้
  maybeStartMusic();
}

function closeReader(){
  $("#reader").classList.remove("open");
  document.body.style.overflow = "";
  current = -1;
}
$("#btnBack").onclick = closeReader;

/* ── progress + เลขหน้า ── */
const stage = $("#stage");
function updateProgress(){
  if(current < 0) return;
  const total = STORIES[current].pages.length;
  const pages = [...stage.querySelectorAll(".page")];
  const mid = stage.scrollTop + stage.clientHeight/2;
  let idx = 0;
  pages.forEach((pg,i)=>{ if(pg.offsetTop <= mid) idx = i; });
  const cur = Math.min(idx+1, total);
  $("#pageNo").textContent = `${thaiNum(cur)} / ${thaiNum(total)}`;
  const ratio = stage.scrollHeight > stage.clientHeight
    ? stage.scrollTop / (stage.scrollHeight - stage.clientHeight) : 0;
  $("#progBar").style.width = (ratio*100)+"%";
}
let scrollTick;
stage.addEventListener("scroll", ()=>{
  cancelAnimationFrame(scrollTick);
  scrollTick = requestAnimationFrame(updateProgress);
  showChrome();
});

/* ── แตะกลางจอเพื่อซ่อน/โชว์แถบเครื่องมือ ── */
let chromeTimer;
function showChrome(){
  $("#rTop").classList.remove("hide");
  $("#rBottom").classList.remove("hide");
  clearTimeout(chromeTimer);
  chromeTimer = setTimeout(()=>{
    $("#rTop").classList.add("hide");
    $("#rBottom").classList.add("hide");
  }, 2600);
}
stage.addEventListener("click", e=>{
  // แตะกลางจอ = สลับแถบ (ไม่รบกวนปุ่มอื่น)
  const t = $("#rTop");
  if(t.classList.contains("hide")) showChrome();
  else { t.classList.add("hide"); $("#rBottom").classList.add("hide"); }
});

/* ── เพลงประกอบ (เพลงเดียววนทั้งแอป) ── */
const audio = $("#audio");
const btnSound = $("#btnSound");
let musicOn = false;
if(MUSIC_URL){
  audio.src = MUSIC_URL;
  btnSound.classList.add("show");
}
function maybeStartMusic(){
  if(MUSIC_URL && musicOn && audio.paused){ audio.play().catch(()=>{}); }
}
btnSound.onclick = ()=>{
  if(!MUSIC_URL) return;
  musicOn = !musicOn;
  if(musicOn){
    audio.play().then(()=>{
      btnSound.classList.add("playing");
      btnSound.textContent = "♪";
    }).catch(()=>{ musicOn=false; });
  } else {
    audio.pause();
    btnSound.classList.remove("playing");
    btnSound.textContent = "♪̶";
  }
};

/* ── ปุ่มย้อนกลับของมือถือ = ปิดโหมดอ่านก่อน ── */
window.addEventListener("popstate", ()=>{ if(current>=0) closeReader(); });

renderHome();
</script>
</body>
</html>
